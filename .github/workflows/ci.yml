name: My CI workflow

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  hello:
    name: My Hello job
    runs-on: ubuntu-latest
    steps:
      - name: Print Hello
        id: hello-step
        run: |
          echo "Hello World"
          echo "message='My message'" >> $GITHUB_OUTPUT
      - name: Second step
        run: |
          echo "second"
          echo ${{steps.hello-step.outputs.message}}
      
  goodbye:
    name: My Goodbye job
    needs: hello
    runs-on: windows-latest
    steps:
      - run: echo "goodbye"

  test:
    name: Test the python package
    runs-on: ${{matrix.platform}}
    strategy:
      matrix:
        python-version: ["3.10","3.14"]
        platform: [ubuntu-latest, macos-latest, windows-latest]
        include:
          - python-version: "3.13"
            platform: "macos-15"
    steps: 
      - name: Checkout repo
        uses: actions/checkout@v6
      - name: Set up python
        uses: actions/setup-python@v6
        with:
          python-version: ${{matrix.python-version}}
      - name: Install the package
        run: pip install .[test]
      - if: matrix.python-version == '3.14'
        name: conditional step
        run: echo "Using python 3.14"
      - if: runner.os == 'Linux'
        run: echo "This is linux"
      - name: Run the tests
        run: pytest -vv